<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helyszín adatlap | Sportingo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f9fc; color: #0a1628; }
    .sh-wrap { max-width: 1040px; margin: 0 auto; padding: 32px 20px 60px; }
    .sh-hero { position: relative; border-radius: 22px; overflow: hidden; margin-bottom: 32px; min-height: 300px; background: linear-gradient(135deg,#1a8fc1,#2dbf7e); }
    .sh-hero img { width: 100%; height: 380px; object-fit: cover; display: block; }
    .sh-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,22,40,.75) 0%, transparent 55%); }
    .sh-hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 32px; }
    .sh-hero-content h1 { color: white; font-size: clamp(1.5rem,3vw,2.2rem); font-weight: 900; margin: 0 0 8px; line-height: 1.2; }
    .sh-hero-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .sh-hero-meta span { color: rgba(255,255,255,.8); font-size: .88rem; display: flex; align-items: center; gap: 5px; }
    .sh-breadcrumb { font-size: .8rem; color: #6b8a9a; margin-bottom: 20px; }
    .sh-breadcrumb a { color: #1a8fc1; text-decoration: none; }
    .sh-breadcrumb a:hover { text-decoration: underline; }
    .sh-body { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
    @media(max-width: 760px) { .sh-body { grid-template-columns: 1fr; } }
    .sh-card { background: white; border-radius: 16px; border: 1.5px solid #d4e8f0; padding: 20px 22px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(10,22,40,.05); }
    .sh-card-title { font-size: 1rem; font-weight: 800; color: #0a1628; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
    .sh-group { margin-bottom: 28px; }
    .sh-group-title { font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #6b8a9a; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1.5px solid #f0f7fb; }
    .sh-palya-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .sh-palya-card { border: 1.5px solid #d4e8f0; border-radius: 14px; overflow: hidden; transition: all .2s; background: white; text-decoration: none !important; color: inherit; display: flex; flex-direction: column; }
    .sh-palya-card:hover { border-color: #1a8fc1; box-shadow: 0 6px 24px rgba(26,143,193,.12); transform: translateY(-2px); }
    .sh-palya-thumb { aspect-ratio: 16/9; overflow: hidden; background: linear-gradient(135deg,rgba(26,143,193,.08),rgba(45,191,126,.08)); }
    .sh-palya-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
    .sh-palya-card:hover .sh-palya-thumb img { transform: scale(1.04); }
    .sh-palya-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: rgba(26,143,193,.25); }
    .sh-palya-body { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .sh-palya-nev { font-weight: 800; font-size: .92rem; color: #0a1628; line-height: 1.3; }
    .sh-palya-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .sh-tag { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: #f0f7fb; color: #6b8a9a; border: 1px solid #d4e8f0; }
    .sh-palya-footer { margin-top: auto; padding-top: 8px; border-top: 1px solid #f0f7fb; display: flex; align-items: center; justify-content: space-between; }
    .sh-palya-ar { font-weight: 800; font-size: .9rem; background: linear-gradient(135deg,#1a8fc1,#2dbf7e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sh-palya-arrow { font-size: .8rem; color: #1a8fc1; font-weight: 700; }
    .sh-leiras { font-size: .88rem; color: #3a5060; line-height: 1.7; white-space: pre-wrap; }
    .sh-map iframe { width: 100%; height: 200px; border: 0; border-radius: 10px; display: block; margin-bottom: 8px; }
    .sh-map-link { font-size: .82rem; color: #1a8fc1; font-weight: 600; text-decoration: none; }
    .sh-map-link:hover { text-decoration: underline; }
    @media(max-width:480px) { .sh-palya-grid { grid-template-columns: 1fr; } }
    /* Loading / 404 */
    .sh-loading { text-align: center; padding: 80px 20px; color: #6b8a9a; font-size: .95rem; }
    .sh-loading-spinner { width: 40px; height: 40px; border: 3px solid #d4e8f0; border-top-color: #1a8fc1; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sh-404 { text-align: center; padding: 80px 20px; }
    .sh-404 .sh-404-icon { font-size: 3rem; margin-bottom: 16px; }
    .sh-404 h2 { color: #0a1628; margin-bottom: 8px; }
    .sh-404 p { color: #6b8a9a; font-size: .9rem; margin-bottom: 20px; }
    .sh-404 a { color: #1a8fc1; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<div class="sh-wrap" id="sh-root">
  <div class="sh-loading">
    <div class="sh-loading-spinner"></div>
    Adatok betöltése…
  </div>
</div>

<script>
const SUPABASE_URL = 'https://amowwfjxeursokkznmxl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtb3d3Zmp4ZXVyc29ra3pubXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDE4NzQsImV4cCI6MjA4OTkxNzg3NH0.eajpxK96IAF-4XVIv4JALYZ-LqCqXaxU7GIaAE0T5L0';

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get('slug') || '';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(num) {
  return Number(num).toLocaleString('hu-HU');
}

async function sbFetch(path) {
  const res = await fetch(SUPABASE_URL + path, {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, Accept: 'application/json' }
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function render404() {
  document.getElementById('sh-root').innerHTML = `
    <div class="sh-404">
      <div class="sh-404-icon">🏟</div>
      <h2>A helyszín nem található</h2>
      <p>Lehet, hogy a link hibás, vagy a helyszín már nem elérhető.</p>
      <a href="https://sportingo.hu">← Vissza a főoldalra</a>
    </div>`;
}

function sportIcon(sportag) {
  const icons = { 'Futball': '⚽', 'Tenisz': '🎾', 'Padel': '🏸', 'Squash': '🟡' };
  return icons[sportag] || '🏃';
}

async function init() {
  const slug = getSlug();
  if (!slug) { render404(); return; }

  let helyszin, palyas;
  try {
    const hData = await sbFetch(
      '/rest/v1/helyszinek?slug=eq.' + encodeURIComponent(slug)
      + '&statusz=eq.jovahagyva'
      + '&select=*'
      + '&limit=1'
    );
    helyszin = hData[0];
  } catch(e) { render404(); return; }
  if (!helyszin) { render404(); return; }

  try {
    palyas = await sbFetch(
      '/rest/v1/palyas?helyszin_id=eq.' + encodeURIComponent(helyszin.id)
      + '&statusz=eq.jovahagyva'
      + '&select=id,nev,slug,boritas,fedett,jatekforma,ar_per_ora,kep_url,leiras,sportag,foglalas_tipus,kulso_link'
      + '&order=jatekforma.asc,nev.asc'
    );
  } catch(e) { palyas = []; }

  const nev          = helyszin.nev || '';
  const varos        = helyszin.varos || '';
  const cim          = helyszin.helyszin || '';
  const leiras       = helyszin.leiras || '';
  const nyitvatartas = helyszin.nyitvatartas_szoveg || '';
  const mapsUrl      = helyszin.google_maps_url || '';
  const mapsLink     = helyszin.maps_link || '';
  // Hero kép: helyszínnek nincs kep_url (törölve), az első pálya képét használjuk
  const kepUrl       = (palyas[0] && palyas[0].kep_url) ? palyas[0].kep_url : '';

  document.title = nev + (varos ? ' – ' + varos : '') + ' | Sportingo';

  // Csoportosítás jatekforma szerint
  const csoportok = { 'Kispálya': [], 'Nagypálya': [], 'Egyéb': [] };
  palyas.forEach(p => {
    const jf = p.jatekforma || '';
    if (jf.includes('Kispálya')) csoportok['Kispálya'].push(p);
    else if (jf.includes('Nagypálya')) csoportok['Nagypálya'].push(p);
    else csoportok['Egyéb'].push(p);
  });

  function palyaCardHTML(p) {
    const pUrl = p.slug ? `https://adatlap.sportingo.hu/palya?slug=${p.slug}` : '#';
    const tags = [p.boritas, p.fedett].filter(Boolean);
    return `
      <a href="${esc(pUrl)}" class="sh-palya-card">
        <div class="sh-palya-thumb">
          ${p.kep_url
            ? `<img src="${esc(p.kep_url)}" alt="${esc(p.nev || '')}" loading="lazy">`
            : `<div class="sh-palya-thumb-placeholder">${sportIcon(p.sportag)}</div>`}
        </div>
        <div class="sh-palya-body">
          <div class="sh-palya-nev">${esc(p.nev || 'Névtelen pálya')}</div>
          ${tags.length ? `<div class="sh-palya-tags">${tags.map(t => `<span class="sh-tag">${esc(t)}</span>`).join('')}</div>` : ''}
          <div class="sh-palya-footer">
            ${p.ar_per_ora ? `<div class="sh-palya-ar">${fmt(p.ar_per_ora)} Ft/óra</div>` : '<div></div>'}
            <div class="sh-palya-arrow">Részletek →</div>
          </div>
        </div>
      </a>`;
  }

  let palyakHTML = '';
  if (palyas.length === 0) {
    palyakHTML = `
      <div class="sh-card" style="text-align:center;color:#6b8a9a;padding:3rem;">
        <div style="font-size:2rem;margin-bottom:8px;">⚽</div>
        <div style="font-weight:700;color:#0a1628;">Hamarosan</div>
        <div style="font-size:.85rem;margin-top:4px;">A pályák adatai feltöltés alatt állnak.</div>
      </div>`;
  } else {
    const csoportTitles = {
      'Kispálya': '⚽ Kispályák',
      'Nagypálya': '🏟 Nagypályák',
      'Egyéb': '🏃 Pályák'
    };
    for (const [cnev, cpalyas] of Object.entries(csoportok)) {
      if (cpalyas.length === 0) continue;
      palyakHTML += `
        <div class="sh-group">
          <div class="sh-group-title">
            ${csoportTitles[cnev]} <span style="font-weight:400;margin-left:4px;">(${cpalyas.length} db)</span>
          </div>
          <div class="sh-palya-grid">
            ${cpalyas.map(palyaCardHTML).join('')}
          </div>
        </div>`;
    }
  }

  const leirasHTML = leiras ? `
    <div class="sh-card">
      <div class="sh-card-title">📝 Leírás</div>
      <div class="sh-leiras">${esc(leiras)}</div>
    </div>` : '';

  const terképHTML = mapsUrl ? `
    <div class="sh-card sh-map">
      <div class="sh-card-title">🗺 Térkép</div>
      <iframe src="${esc(mapsUrl)}" loading="lazy" allowfullscreen></iframe>
      ${mapsLink ? `<a class="sh-map-link" href="${esc(mapsLink)}" target="_blank" rel="noopener">Megnyitás Google Maps-ben →</a>` : ''}
    </div>` : '';

  const nyitHTML = nyitvatartas ? `
    <div class="sh-card">
      <div class="sh-card-title">🕐 Nyitvatartás</div>
      <div style="font-size:.85rem;color:#3a5060;line-height:1.8;white-space:pre-wrap;">${esc(nyitvatartas)}</div>
    </div>` : '';

  document.getElementById('sh-root').innerHTML = `
    <div class="sh-breadcrumb">
      <a href="https://sportingo.hu">Főoldal</a> →
      <a href="https://sportingo.hu/#palyak">Pályák</a> →
      ${esc(nev)}
    </div>

    <div class="sh-hero">
      ${kepUrl ? `<img src="${esc(kepUrl)}" alt="${esc(nev)}">` : ''}
      <div class="sh-hero-overlay"></div>
      <div class="sh-hero-content">
        <h1>${esc(nev)}</h1>
        <div class="sh-hero-meta">
          ${varos ? `<span>📍 ${esc(varos + (cim ? ', ' + cim : ''))}</span>` : ''}
          ${palyas.length ? `<span>⚽ ${palyas.length} pálya</span>` : ''}
        </div>
      </div>
    </div>

    <div class="sh-body">
      <div class="sh-main">
        ${palyakHTML}
        ${leirasHTML}
        ${terképHTML}
      </div>
      <div class="sh-sidebar">
        ${nyitHTML}
      </div>
    </div>`;
}

init();
</script>
</body>
</html>
